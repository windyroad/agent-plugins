name: Bug report
description: Report a defect in a windyroad plugin (hook misfires, skill fails to load, install errors, etc.).
title: "[bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. The fields below help triage faster. For security vulnerabilities, **do not file here** -- use [GitHub Security Advisories](https://github.com/windyroad/agent-plugins/security/advisories/new) instead. For usage questions, use [Discussions](https://github.com/windyroad/agent-plugins/discussions).

  - type: dropdown
    id: plugin
    attributes:
      label: Affected plugin
      description: Which plugin or component is involved? Pick "multiple" or "unsure" if unclear.
      options:
        - "@windyroad/agent-plugins (umbrella installer)"
        - "@windyroad/architect"
        - "@windyroad/c4"
        - "@windyroad/connect"
        - "@windyroad/itil"
        - "@windyroad/jtbd"
        - "@windyroad/retrospective"
        - "@windyroad/risk-scorer"
        - "@windyroad/style-guide"
        - "@windyroad/tdd"
        - "@windyroad/voice-tone"
        - "@windyroad/wardley"
        - "multiple plugins"
        - "unsure"
    validations:
      required: true

  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      description: From `claude plugin list` or `~/.claude/plugins/cache/windyroad/<plugin>/`. If multiple, list each on a new line.
      placeholder: "e.g. @windyroad/itil@0.7.2"
    validations:
      required: true

  - type: input
    id: claude-code-version
    attributes:
      label: Claude Code version
      description: From `claude --version`.
      placeholder: "e.g. 1.x.x"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. macOS 15.2, Ubuntu 24.04, Windows 11 + WSL2"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Minimal steps to reproduce. Include the exact prompt, command, or file edit that triggers the bug.
      placeholder: |
        1. Run `npx @windyroad/architect`
        2. Open Claude Code
        3. Type `/wr-architect:create-adr`
        4. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Include error messages, hook output, or transcript snippets. Redact any secrets.
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Workarounds tried, related issues, screenshots, or transcript links.
