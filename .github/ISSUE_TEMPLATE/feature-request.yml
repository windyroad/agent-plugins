name: Feature request
description: Suggest a new capability, plugin, hook, or skill.
title: "[feature] "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature. The fields below help us understand the problem before discussing the solution. For usage questions, use [Discussions](https://github.com/windyroad/agent-plugins/discussions) instead.

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Where would this live?
      options:
        - "Existing plugin -- enhancement"
        - "Existing plugin -- new skill or agent"
        - "New plugin"
        - "Cross-plugin convention or hook"
        - "Repo tooling (CI, scripts, docs)"
        - "Unsure"
    validations:
      required: true

  - type: input
    id: target-plugin
    attributes:
      label: Target plugin (if applicable)
      description: Which plugin would gain or host this capability?
      placeholder: "e.g. @windyroad/itil, or 'n/a' for cross-cutting"

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user pain or workflow gap motivates this? Concrete observations beat abstract requests.
      placeholder: |
        e.g. "When I run /wr-architect:create-adr in a fresh project, it writes to docs/decisions/ but the directory does not exist, so the file write fails."
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: What change resolves the problem? A sketch is fine -- the maintainers will refine it.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other shapes you weighed and why they fall short.

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Related issues, prior discussions, screenshots, or transcript links.
