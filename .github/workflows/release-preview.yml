name: Release Preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  preview:
    name: Publish Preview
    # Only run on the changesets "Version Packages" PR
    if: github.head_ref == 'changeset-release/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci || npm install

      - name: Publish preview packages
        id: preview
        run: |
          # Publish all packages with a preview tag
          PUBLISHED=""
          for pkg in packages/*/package.json; do
            dir=$(dirname "$pkg")
            name=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$pkg','utf8')).name)")
            version=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$pkg','utf8')).version)")

            # Skip shared (no package.json with name) and already-published versions
            [ -z "$name" ] && continue

            echo "Publishing $name@$version with tag preview..."
            (cd "$dir" && npm publish --tag preview --provenance --access public 2>&1) || true
            PUBLISHED="$PUBLISHED\n- \`$name@$version\` → \`npm install $name@preview\`"
          done

          echo "published<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$PUBLISHED" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Smoke test preview install
        run: |
          # Verify the meta-installer preview is installable
          npm info @windyroad/agent-plugins@preview version 2>/dev/null && \
            echo "Preview package available on npm" || \
            echo "Preview package not yet available (first publish)"

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const published = `${{ steps.preview.outputs.published }}`;
            const body = [
              '## Release Preview',
              '',
              'Preview packages published to npm with the `preview` tag.',
              '',
              '### Test it',
              '',
              '```bash',
              '# Install the full preview suite',
              'npx @windyroad/agent-plugins@preview',
              '',
              '# Or test individual packages',
              'npx @windyroad/architect@preview',
              'npx @windyroad/c4@preview',
              '```',
              '',
              '### Published packages',
              '',
              published,
              '',
              '---',
              '*Merge this PR to publish these versions to `latest`.*',
            ].join('\n');

            // Find existing preview comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## Release Preview')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
