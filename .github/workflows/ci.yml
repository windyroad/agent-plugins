name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      - name: Validate marketplace manifest
        run: |
          node -e "
            const m = JSON.parse(require('fs').readFileSync('.claude-plugin/marketplace.json', 'utf8'));
            const pkgs = require('fs').readdirSync('packages').filter(d =>
              d !== 'shared' && d !== 'agent-plugins' &&
              require('fs').existsSync('packages/' + d + '/.claude-plugin/plugin.json')
            );
            const sources = m.plugins.map(p => p.source.replace('./packages/', ''));
            const missing = pkgs.filter(p => !sources.includes(p));
            if (missing.length) { console.error('Marketplace missing:', missing); process.exit(1); }
            console.log('Marketplace manifest OK:', m.plugins.length, 'plugins');
          "

      - name: Validate all packages have required files
        run: |
          for pkg in packages/*/; do
            name=$(basename "$pkg")
            [ "$name" = "shared" ] && continue
            [ "$name" = "agent-plugins" ] && continue

            if [ ! -f "$pkg/.claude-plugin/plugin.json" ]; then
              echo "FAIL: $name missing .claude-plugin/plugin.json"
              exit 1
            fi
            if [ ! -f "$pkg/package.json" ]; then
              echo "FAIL: $name missing package.json"
              exit 1
            fi
            if [ ! -f "$pkg/bin/install.mjs" ]; then
              echo "FAIL: $name missing bin/install.mjs"
              exit 1
            fi
            echo "OK: $name"
          done

      - name: Validate package.json fields
        run: |
          for pkg in packages/*/package.json; do
            node -e "
              const p = JSON.parse(require('fs').readFileSync('$pkg', 'utf8'));
              const errors = [];
              if (!p.name?.startsWith('@windyroad/')) errors.push('name must start with @windyroad/');
              if (!p.version) errors.push('missing version');
              if (!p.description) errors.push('missing description');
              if (!p.bin) errors.push('missing bin');
              if (!p.repository) errors.push('missing repository');
              if (errors.length) { console.error('$pkg:', errors.join(', ')); process.exit(1); }
              console.log('OK:', p.name, p.version);
            "
          done

      - name: Check install-utils.mjs copies in sync (P026)
        run: npm run check:install-utils

      - name: Check session-marker.sh copies in sync (P095, ADR-038)
        run: npm run check:session-marker

      - name: Check external-comms-gate.sh copies in sync (P064, ADR-028 amended)
        run: npm run check:external-comms-gate

      - name: Check derive-first-dispatch.sh copies in sync (P132 Phase 2a-iii-B, ADR-017)
        run: npm run check:derive-first-dispatch

      - name: Check command-detect.sh copies in sync (P268 / P275, ADR-017)
        run: npm run check:command-detect

      - name: Check plugin manifest versions in sync with package.json (P042, ADR-021)
        run: npm run check:plugin-manifests

      - name: Check shim-wrapper templates in sync (P343, ADR-080)
        run: npm run check:shim-wrappers

      - name: Check locale-discipline in bash scripts (P328, advisory)
        run: packages/itil/bin/wr-itil-check-locale-discipline .

      - name: Check fail-soft-skip discipline in SKILL.md surfaces (P351, advisory)
        run: packages/itil/bin/wr-itil-check-fail-soft-skip-discipline .
        continue-on-error: true

      - name: Dry-run meta-installer
        run: node packages/agent-plugins/bin/install.mjs --dry-run

      - name: Dry-run per-plugin installers
        run: |
          for pkg in packages/*/bin/install.mjs; do
            name=$(basename "$(dirname "$(dirname "$pkg")")")
            [ "$name" = "agent-plugins" ] && continue
            echo "--- $name ---"
            node "$pkg" --dry-run
          done

      - name: Install Claude Code CLI for plugin manifest validation (P263, ADR-063 Confirmation #11)
        run: npm i -g @anthropic-ai/claude-code@2.1.150

      - name: Validate each plugin manifest (P263, ADR-063 Confirmation #11; non-strict per P258 refined RCA)
        run: packages/itil/bin/wr-itil-plugin-validate-ci-gate

      - name: Run hook tests
        run: npm test
