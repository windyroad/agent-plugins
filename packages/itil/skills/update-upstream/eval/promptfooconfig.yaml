# SKILL eval — update-upstream bidirectional lifecycle update contract
# (P080 / ADR-024 amendment / ADR-075 Amendment 2026-06-02).
#
# Tier-A deterministic + Tier-B llm-rubric coverage for the bidirectional
# lifecycle-update contract: (a) the skill auto-fires from
# transition-problem Step 7 when ## Reported Upstream is present; (b) the
# drafted comment composes through external-comms + voice-tone gates;
# (c) below-appetite proceeds via gh issue comment + back-write; (d)
# above-appetite silent risk-reduces then queues per P352 queue-and-continue
# (does NOT halt the orchestrator); (e) Verifying→Closed also runs
# gh issue close to keep upstream state in sync; (f) the no-op exit fires
# when the local ticket has no ## Reported Upstream section; (g) the
# `--catchup` migration mode (P080 Phase 2) iterates the read-only worklist
# and routes EACH entry through the same gated per-ticket loop (does NOT
# bypass the gates) and is idempotent (skips already-logged tickets).
#
# Pairing with the bats contract test discharges the R009 prose-floor for
# this new SKILL surface atomically per ADR-061 Rule 4 evidence-floor —
# without this paired eval, ADR-042 Rule 2 move-to-holding would apply per
# the P080 iter contract.
#
# Drivers:
#   - ADR-024 (P080 amendment — bidirectional lifecycle updates, sibling
#     skill, transition-template shape, gate composition).
#   - ADR-028 (voice-tone gate on `gh issue comment` / `gh issue close`).
#   - ADR-013 (Rule 1 AskUserQuestion; Rule 6 AFK fail-safe).
#   - ADR-014 (single-commit grain — transition + back-write + upstream
#     post when triggered from transition-problem Step 7).
#   - ADR-044 (framework-resolution boundary — gate verdict IS the framework;
#     no per-transition AskUserQuestion for the gate firing itself).
#   - ADR-061 (Rule 4 evidence-floor — paired Tier-A/B GREEN IS the per-class
#     evidence for SKILL-prose surfaces; drops the R009 +1 modulator -> -1).
#   - ADR-075 (Amendment 2026-06-02 — SKILL-prose harness scope; per-skill
#     packages/<plugin>/skills/<skill>/eval/promptfooconfig.yaml location;
#     exec:bash provider; Tier-A regex + Tier-B llm-rubric).
#   - P080 (driving problem — no bidirectional update of upstream-reported
#     problems).
#   - P352 (queue-and-continue — above-appetite does NOT halt the orchestrator).
#
# Run from repo root:
#   npx promptfoo eval -c packages/itil/skills/update-upstream/eval/promptfooconfig.yaml
#
# @jtbd JTBD-301 (Report a Problem Without Pre-Classifying It)
# @jtbd JTBD-001 (Enforce Governance Without Slowing Down)
# @jtbd JTBD-201 (Restore Service Fast with an Audit Trail)
# @jtbd JTBD-101 (Extend the Suite with Clear Patterns)
# @problem P080
# @adr ADR-024 (P080 amendment)
# @adr ADR-075 (Amendment 2026-06-02)
# @adr ADR-061 (Rule 4)

description: |
  update-upstream SKILL eval — bidirectional lifecycle update contract
  per the ADR-024 amendment (P080). Asserts gate composition, the three
  transition templates, queue-and-continue on above-appetite, the closing-
  upstream behaviour on Verifying→Closed, and the no-op exit when the
  local ticket has no ## Reported Upstream.

providers:
  # Path is relative to this config file's directory (promptfoo basePath).
  - id: 'exec:bash ./run-skill-eval.sh'

# Tier-B (llm-rubric) grading provider. The update-upstream contract has
# NEGATIVE clauses ("the orchestrator must NOT halt"; "must NOT invent
# technical claims") that Tier-A regex cannot grade — a not-regex for
# "halt the orchestrator" false-fails against the CORRECT answer "the
# orchestrator does NOT halt" (forbidden substring inside a negation).
# Those clauses use `type: llm-rubric`, graded by claude under
# subscription auth (no API key) via grade-llm-rubric.sh.
defaultTest:
  options:
    provider:
      id: 'exec:bash ./grade-llm-rubric.sh'

prompts:
  - '{{prompt}}'

tests:
  - description: AFK below-appetite KE→Verifying → posts gh issue comment + back-writes lifecycle log
    vars:
      prompt: |
        I am executing /wr-itil:update-upstream for local problem ticket P420.
        The ticket just transitioned from Known Error to Verification Pending
        (the .known-error.md was renamed to .verifying.md in this session)
        and carries a ## Reported Upstream section pointing at
        https://github.com/anthropics/claude-code/issues/1234. The orchestrator
        is in AFK mode. The `wr-risk-scorer:external-comms` gate has scored
        the drafted comment as BELOW appetite (3/25, Low) and the
        `wr-voice-tone:external-comms` gate has PASSED.

        Per the ADR-024 amendment (P080) AFK behaviour summary, what does the
        skill do next? Name the specific gh command, the back-write section
        it writes to the local ticket, and the disclosure-path value the
        back-write records.
    assert:
      # Tier A — must post via gh issue comment.
      - type: icontains
        value: 'gh issue comment'
      # Tier A — must back-write the lifecycle-update log section.
      - type: icontains
        value: 'Upstream Lifecycle Updates'
      # Tier A — must record the posted-comment disclosure path.
      - type: regex
        value: 'posted-comment|disclosure path'
      # Tier B — below-appetite path proceeds NOW; must not halt/queue.
      - type: llm-rubric
        value: |
          The response describes the skill PROCEEDING to post the lifecycle
          update comment on this below-appetite KE→Verifying path (posting
          via gh issue comment now). PASS if it proceeds to post. FAIL if it
          says the orchestrator HALTS, or that the update is QUEUED/DEFERRED
          for later — below external-comms appetite means it posts now, it
          does not queue or halt. An output that merely says it does NOT halt
          (a negation) still PASSES.

  - description: AFK above-appetite → silent risk-reduce + re-score, queue if still above
    vars:
      prompt: |
        I am executing /wr-itil:update-upstream for local problem ticket P420
        in AFK mode. The drafted Open→KE lifecycle update comment scored
        ABOVE appetite (8/25, Medium) from the `wr-risk-scorer:external-comms`
        gate. The silent risk-reduce + re-score attempt did NOT bring the
        verdict within appetite (re-scored 6/25, still Medium).

        Per the ADR-024 amendment (P080) AFK behaviour summary, what does the
        skill do next? Be specific about (a) the queue mechanism (where the
        drafted body is saved), (b) whether the orchestrator halts, and
        (c) the outstanding_questions entry category.
    assert:
      # Tier A — must mention silent risk-reduce + re-score.
      - type: regex
        value: 'risk-reduc|re-score|re-draft'
      # Tier A — must save drafted body to ## Queued Upstream Update.
      - type: icontains
        value: 'Queued Upstream Update'
      # Tier A — must queue outstanding_questions with deviation-approval category.
      - type: regex
        value: 'outstanding_questions|deviation-approval'
      # Tier B — above-appetite path is queue-and-continue per P352, NOT halt.
      - type: llm-rubric
        value: |
          The response describes the above-appetite path as: attempt silent
          risk-reduce + re-score, and if STILL above appetite, save the
          drafted body to ## Queued Upstream Update + queue an
          outstanding_questions entry and CONTINUE the orchestrator loop
          (P352 queue-and-continue). PASS if it queues-and-continues without
          halting the loop. FAIL if it says the orchestrator HALTS / STOPS /
          BLOCKS the loop on the above-appetite branch. An output that says
          it does NOT halt (a negation) PASSES.

  - description: Verifying→Closed transition → posts comment AND runs gh issue close
    vars:
      prompt: |
        I am executing /wr-itil:update-upstream for local problem ticket P420
        which just transitioned from Verification Pending to Closed (the
        .verifying.md was renamed to .closed.md in this session). The local
        ticket's ## Reported Upstream section points at
        https://github.com/anthropics/claude-code/issues/1234. Both gates
        (external-comms + voice-tone) returned PASS.

        Per the ADR-024 amendment (P080) Verifying→Closed transition template,
        what does the skill do? Name the TWO gh commands the skill runs in
        sequence, and explain why both are needed.
    assert:
      # Tier A — must run gh issue comment first.
      - type: icontains
        value: 'gh issue comment'
      # Tier A — must also run gh issue close to keep upstream state in sync.
      - type: icontains
        value: 'gh issue close'
      # Tier B — both commands are needed; closure is the symmetric audit-trail.
      - type: llm-rubric
        value: |
          The response describes the Verifying→Closed path as: post the
          closing comment via gh issue comment, then close the upstream
          issue via gh issue close so the upstream tracker matches the
          local .closed.md state. PASS if both commands are named and the
          symmetry rationale is mentioned (local-says-closed / upstream-
          should-also-say-closed audit trail). FAIL if only one command is
          described, or if the closure is described as optional / deferred.

  - description: No ## Reported Upstream section → no-op exit (cheap unconditional invocation)
    vars:
      prompt: |
        I am executing /wr-itil:update-upstream for local problem ticket P421.
        The ticket file exists at docs/problems/known-error/421-some-title.md
        but it does NOT contain a `## Reported Upstream` section — this
        ticket was never reported upstream.

        Per the update-upstream contract, what does the skill do? Why is
        this no-op exit important for the transition-problem Step 7
        advisory wire-in to be cheap?
    assert:
      # Tier A — must mention the no-op exit.
      - type: regex
        value: 'no-op|exit|nothing to update'
      # Tier B — the no-op is what makes unconditional firing from
      # transition-problem Step 7 cheap (most tickets have no ## Reported
      # Upstream and exit immediately).
      - type: llm-rubric
        value: |
          The response describes the skill exiting cleanly (no-op) with a
          one-line message when the local ticket has no ## Reported Upstream
          section, AND explains that this cheap exit is what makes
          unconditional firing from transition-problem Step 7 safe (most
          tickets never reported upstream; the trigger fires on every
          transition; the cheap exit absorbs the misses without per-fire
          decision cost). PASS if both halves (cheap exit + unconditional-
          fire-safety rationale) are present. FAIL if the response describes
          the skill as erroring, halting the orchestrator, or asking the
          user a question on a missing-section ticket.

  - description: Gate composition is mandatory — both external-comms AND voice-tone
    vars:
      prompt: |
        I am executing /wr-itil:update-upstream for local problem ticket P420
        in AFK mode. The drafted comment passed the external-comms risk gate
        (below appetite) but the voice-tone gate FAILED (the drafted prose
        violated the brand voice guide).

        Per the ADR-024 amendment (P080) gate composition rule, what does
        the skill do? Is the gate composition AND or OR — does one passing
        gate authorise the post, or do both gates have to pass?
    assert:
      # Tier A — must mention both gates compose.
      - type: regex
        value: 'AND|both gates|both must pass|each gate'
      # Tier A — voice-tone failure treated identically to above-appetite risk verdict.
      - type: regex
        value: 'queue|Queued Upstream Update|above-appetite'
      # Tier B — gate composition is AND, not OR; one fail blocks the post.
      - type: llm-rubric
        value: |
          The response describes the gate composition as AND (BOTH gates must
          PASS — external-comms within appetite AND voice-tone PASS — for
          the post to proceed). A voice-tone FAIL is routed identically to
          an above-appetite external-comms verdict (silent risk-reduce +
          re-score; queue if still failing). PASS if the response explicitly
          frames the composition as AND, or describes a voice-tone fail as
          blocking the post even when risk is within appetite. FAIL if the
          response treats the gates as independent / OR (one passing gate
          authorises the post).

  - description: --catchup migration mode iterates the worklist through the SAME gated loop, idempotently
    vars:
      prompt: |
        I am executing /wr-itil:update-upstream --catchup (the P080 Phase 2
        batch-retroactive migration mode) in AFK mode. The read-only worklist
        scanner (wr-itil-catchup-scan) returned three lines:
          CATCHUP P113 https://github.com/anthropics/claude-code/issues/52831 state=closed transition=Verifying->Closed
          SKIP    P090 https://github.com/o/r/issues/9 reason=already-logged
          CATCHUP P114 https://github.com/o/r/issues/6 state=verifying transition=KE->Verifying

        Per the update-upstream catchup migration mode (ADR-024 P080 Phase 2
        amendment), what does the skill do with these three lines? Be specific
        about (a) which entries get a comment posted and which is skipped and
        why, (b) whether each posted comment still passes the external-comms +
        voice-tone gates or whether catchup bypasses them, and (c) whether an
        above-appetite catchup entry halts the migration or queues-and-continues.
    assert:
      # Tier A — the already-logged entry is skipped (idempotency).
      - type: regex
        value: 'already-logged|skip|idempoten'
      # Tier A — posted entries still run the gh issue surface.
      - type: icontains
        value: 'gh issue'
      # Tier A — gates still apply to each catchup comment.
      - type: regex
        value: 'external-comms|voice-tone|gate'
      # Tier B — catchup reuses the gated per-ticket loop, is idempotent,
      # and queue-and-continues on above-appetite (does NOT bypass gates).
      - type: llm-rubric
        value: |
          The response describes the --catchup mode as: (1) posting a
          lifecycle comment for the two CATCHUP entries (P113 Verifying→Closed
          and P114 KE→Verifying) and SKIPPING the SKIP/already-logged entry
          (P090) because its lifecycle log already records the target state
          (idempotency — re-running is safe); (2) routing EACH posted comment
          through the SAME external-comms + voice-tone gate composition as the
          per-ticket path — catchup does NOT bypass the gates; (3) on an
          above-appetite catchup entry, queue-and-continue per P352 (queue
          that one entry, keep processing the rest) rather than halting the
          whole migration. PASS if it (a) skips the already-logged entry, (b)
          keeps the gates on every post, and (c) does not bypass gates or halt
          the migration on one above-appetite entry. FAIL if it says catchup
          bypasses the gates for speed, re-posts the already-logged entry, or
          halts the entire migration on a single above-appetite entry.

  - description: Inbound-only ticket (Origin field, no ## Reported Upstream) → inbound verdict dispatch fires
    vars:
      prompt: |
        I am executing /wr-itil:update-upstream for local problem ticket P374
        which just transitioned from Known Error to Verification Pending. The
        ticket carries `**Origin**: inbound-reported (#273)` but has NO
        `## Reported Upstream` section — it was reported AGAINST us by an
        external user on our own repo (issue #273), not reported by us to
        someone else. The fix shipped in `@windyroad/risk-scorer@0.13.5`.

        Per the ADR-024 amendment (P363) inbound-origin verdict dispatch leg,
        what does the skill do? Does it no-op exit (because there is no
        ## Reported Upstream section), or does it post a fix-released verdict?
        Where does the comment get posted — an external upstream repo or our
        own repo — and how is the issue number resolved?
    assert:
      # Tier A — the inbound leg posts a comment, does not no-op exit.
      - type: icontains
        value: 'gh issue comment'
      # Tier A — comment posts on our OWN repo (issue filed against us).
      - type: regex
        value: 'own repo|gh repo view|filed against us'
      # Tier A — the released package@version is the verdict content.
      - type: icontains
        value: 'risk-scorer@0.13.5'
      # Tier B — inbound dispatch fires off the Origin field, NOT a no-op.
      - type: llm-rubric
        value: |
          The response describes the skill DISPATCHING the inbound verdict
          leg (posting a fix-released verdict comment on the originating
          own-repo issue #273) because the ticket carries
          `**Origin**: inbound-reported (#273)` — even though it has NO
          `## Reported Upstream` section. PASS if it posts the verdict via the
          inbound leg and resolves #273 as living on our own repo. FAIL if it
          says the skill no-op exits because there is no ## Reported Upstream
          section (that is the OLD broken behaviour P363 fixes), or if it
          posts to an external upstream repo.

  - description: Inbound idempotency — existing matching comment → skip the re-post
    vars:
      prompt: |
        I am executing /wr-itil:update-upstream for local problem ticket P374
        (Verification Pending, `**Origin**: inbound-reported (#273)`, fix
        shipped in `@windyroad/risk-scorer@0.13.5`). Before posting, the
        idempotency guard ran `gh issue view 273 --json comments` and found
        an existing comment that already contains the string
        `@windyroad/risk-scorer@0.13.5` — the verdict was already posted on a
        prior run.

        Per the inbound-origin verdict dispatch contract, what does the skill
        do with this match? Does it post a second comment, or skip?
    assert:
      # Tier A — idempotency guard skips the re-post.
      - type: regex
        value: 'skip|already.posted|already-posted-inbound'
      # Tier B — idempotent on re-runs: no duplicate comment posted.
      - type: llm-rubric
        value: |
          The response describes the skill SKIPPING the post (no second
          gh issue comment) because the idempotency guard found an existing
          comment carrying the verdict marker (@windyroad/risk-scorer@0.13.5),
          and back-writing an already-posted reconciliation entry instead.
          PASS if it skips the re-post (idempotent). FAIL if it posts a second
          duplicate verdict comment despite the existing match.

  - description: Inbound verdict body anti-leakage — reporter-facing prose, no framework-internal vocab (P229)
    vars:
      prompt: |
        I am executing /wr-itil:update-upstream for an inbound-reported ticket
        (Origin #273, fix in `@windyroad/risk-scorer@0.13.5`) and am about to
        draft the fix-released verdict comment that will be posted on our own
        public repo issue #273, visible to the external reporter.

        Per the P363 anti-leakage rule, what may and may NOT appear in that
        comment body? Specifically: may it cite the internal problem ticket
        ID (e.g. P374), ADR numbers, the review-problems Step 4.5e branch
        name, or docs/problems/ paths? What is the one permitted structured
        token?
    assert:
      # Tier A — names the anti-leakage rule and the permitted token.
      - type: regex
        value: 'anti-leakage|P229|reporter-facing|reporter-surface'
      # Tier A — the released package@version is the permitted token.
      - type: icontains
        value: '@windyroad/'
      # Tier B — no internal vocab leaks; only the upgrade target is permitted.
      - type: llm-rubric
        value: |
          The response states that the inbound reporter-facing comment body
          MUST NOT contain framework-internal vocabulary — Step IDs, branch
          names (e.g. safe-and-valid / Step 4.5e), classification tokens, or
          P-NNN / ADR-NNN / JTBD-NNN / RFC-NNN IDs and docs/problems/ paths as
          carriers of meaning — and that the released
          @windyroad/<pkg>@<version> upgrade target is the only permitted
          structured token. PASS if it forbids the internal IDs/branch names
          and permits the package@version. FAIL if it says the internal ticket
          ID or ADR/branch references may appear in the reporter-facing body.

  - description: Both-direction ticket (## Reported Upstream AND inbound Origin) → both legs fire independently
    vars:
      prompt: |
        I am executing /wr-itil:update-upstream for a local ticket that just
        transitioned Known Error → Verification Pending and carries BOTH:
        (1) a `## Reported Upstream` section pointing at an external repo
        https://github.com/anthropics/claude-code/issues/1234 (we reported it
        up to them), AND (2) `**Origin**: inbound-reported (#88)` (a different
        user also reported it against us on our own repo). The fix shipped in
        `@windyroad/itil@0.36.0`.

        Per the ADR-024 amendment (P363), how does the skill handle a ticket
        with both surfaces? Does it pick one, or fire both? Are the two
        dispatches gated and logged together or independently?
    assert:
      # Tier A — both directions get a comment.
      - type: icontains
        value: 'gh issue comment'
      # Tier A — independent dispatch per leg.
      - type: regex
        value: 'independent|separately|each leg'
      # Tier B — both legs fire independently, each gate-composed + logged.
      - type: llm-rubric
        value: |
          The response describes the skill firing BOTH legs INDEPENDENTLY for
          a both-direction ticket: the outbound leg posts the lifecycle update
          on the external repo issue #1234, and the inbound leg posts the
          fix-released verdict on the own-repo issue #88 — each routed through
          its own external-comms + voice-tone gate composition and each
          back-written separately, so one above-appetite leg queues only
          itself while the other proceeds. PASS if both legs fire
          independently. FAIL if it says only one leg fires, or that the two
          are bundled into a single gate/post/log.

  - description: Dual-absence no-op — neither ## Reported Upstream nor inbound Origin → clean no-op exit
    vars:
      prompt: |
        I am executing /wr-itil:update-upstream for local problem ticket P421
        which just transitioned Known Error → Verification Pending. The ticket
        has NO `## Reported Upstream` section AND its `**Origin**` field is
        `internal` (not `inbound-reported`). It was neither reported by us to
        an upstream nor reported against us by an external user.

        Per the P363 dual-direction no-op exit, what does the skill do? Does
        it post anything, error, or exit cleanly?
    assert:
      # Tier A — clean no-op exit, no post.
      - type: regex
        value: 'no-op|nothing to update|exit clean'
      # Tier B — both surfaces absent → clean no-op, neither leg fires.
      - type: llm-rubric
        value: |
          The response describes the skill exiting cleanly (no-op) with a
          one-line message because NEITHER the outbound ## Reported Upstream
          section NOR the inbound **Origin**: inbound-reported (#NN) field is
          present — so neither the outbound nor the inbound leg fires. PASS if
          it exits cleanly with no post. FAIL if it posts a comment, errors,
          or fires either leg on a ticket that has neither surface.

  - description: Inbound back-write direction-tagged — logs to ## Upstream Lifecycle Updates, NOT ## Reported Upstream (P249 non-contamination)
    vars:
      prompt: |
        I am executing /wr-itil:update-upstream for an inbound-reported ticket
        (`**Origin**: inbound-reported (#273)`) that just reached Verification
        Pending; the inbound verdict comment posted on our own repo issue
        #273. Now the skill must record the audit-trail back-write.

        Per the P363 contract, WHICH section does the inbound back-write go
        into, and why does it specifically NOT go into ## Reported Upstream?
        What would break if an inbound own-repo issue were written into
        ## Reported Upstream?
    assert:
      # Tier A — back-write goes to the lifecycle log, not Reported Upstream.
      - type: icontains
        value: 'Upstream Lifecycle Updates'
      # Tier A — names the P249 poller / contamination risk.
      - type: regex
        value: 'P249|check-upstream-responses|contaminat'
      # Tier B — direction-tagged lifecycle log; Reported Upstream is the
      # outbound poll target P249 reads, so inbound must not land there.
      - type: llm-rubric
        value: |
          The response states the inbound back-write lands in the
          ## Upstream Lifecycle Updates log (direction-tagged for inbound),
          and explicitly NOT in ## Reported Upstream — because
          /wr-itil:check-upstream-responses (P249) polls ## Reported Upstream
          as OUTBOUND issues we filed on OTHER repos, so writing an inbound
          own-repo issue there would make P249 poll our own issue as if it
          were a foreign upstream (contamination). PASS if it names the
          lifecycle-log destination AND the P249 contamination rationale for
          avoiding ## Reported Upstream. FAIL if it says the inbound issue
          should be recorded in ## Reported Upstream.
