# SKILL eval — manage-problem Release-vehicle seed (P330 Option B).
#
# Tier A deterministic eval — asserts that when prompted to describe the K→V
# (Known Error → Verification Pending) transition sub-steps from
# /wr-itil:manage-problem Step 7, the agent emits the
# `**Release vehicle**: .changeset/<name>.md` seed BEFORE the `git mv` rename.
#
# Drivers:
#   - ADR-075 (Amendment 2026-06-02 — SKILL-prose scope extension; harness
#     provider: promptfoo exec wrapping `claude -p --append-system-prompt`
#     — subscription auth, no API key).
#   - ADR-052 (behavioural-default for skill testing).
#   - RFC-012 S6 (first SKILL-surface slice — closes P012).
#   - P330 Option B (Release-vehicle seed BEFORE `git mv` consolidates two
#     P057 staging-trap windows into one `git add` of the `.verifying.md`
#     path).
#
# Run from repo root:
#   npx promptfoo eval -c packages/itil/skills/manage-problem/eval/promptfooconfig.yaml
#
# @jtbd JTBD-002 (Ship AI-Assisted Code with Confidence)
# @jtbd JTBD-006 (Progress the Backlog While I'm Away)
# @problem P330
# @problem P012 (this slice's landing closes it)
# @rfc RFC-012 S6
# @adr ADR-075 (Amendment 2026-06-02)

description: |
  manage-problem SKILL eval — P330 Option B Release-vehicle seed precedes git mv.

providers:
  # Path is relative to this config file's directory (promptfoo basePath).
  - id: 'exec:bash ./run-skill-eval.sh'

prompts:
  - '{{prompt}}'

tests:
  - description: K→V transition — Release-vehicle seed precedes git mv (P330 Option B)
    vars:
      prompt: |
        I am executing /wr-itil:manage-problem Step 7 (Verify and transition to
        Verification Pending) for a problem ticket currently at
        docs/problems/known-error/330-foo.md. The fix is landed and the changeset
        .changeset/wr-itil-p330-option-b.md is staged.

        Walk me through the EXACT sub-steps to transition this ticket to
        .verifying.md, in order. Be specific about:
          (a) what to edit on the ticket body BEFORE the rename,
          (b) what shell command performs the rename, and
          (c) what to stage afterwards.
    assert:
      # Tier A — must mention "Release vehicle" verbatim (case-insensitive).
      - type: icontains
        value: 'Release vehicle'
      # Tier A — must reference a .changeset path.
      - type: contains
        value: '.changeset/'
      # Tier A — ORDERING: "Release vehicle" must appear BEFORE "git mv".
      # JS-compatible (promptfoo compiles `new RegExp(value)` — no inline flag
      # groups like `(?is)` accepted; case-insensitivity expressed via char
      # classes; dotall covered by `[\s\S]`). Iter-11 fix (2026-06-04, P012
      # reopen): the original `(?is)release\s+vehicle...` errored as "Invalid
      # group" under JS RegExp and was counted as FAIL by promptfoo despite
      # behaviourally-correct responses. See P012 Investigation Tasks.
      - type: regex
        value: '[Rr]elease\s+[Vv]ehicle[\s\S]{0,2000}[Gg]it\s+[Mm]v'
      # Tier A — must NOT say to rename first then edit (the P330-regressing
      # ordering that triggers the helper exit-2 routing).
      #
      # Iter-10 follow-up #1 (2026-06-02): anchor on the rename COMMAND shape
      # — a line beginning with `git mv ` followed by at least one path
      # argument — rather than the bare substring. The bare substring matched
      # legitimate prose like "BEFORE `git mv`, edit the body to set Release
      # vehicle..." as a false-positive regression. The line-anchor `(^|\n)`
      # requires the rename to appear as an actual command (typically inside
      # a shell-fence indented or at column 0), so prose mentions in backticks
      # no longer trip the not-regex while the genuine regression shape —
      # rename emitted first, Release-vehicle mentioned afterwards as a fix-up
      # — still fails the assertion.
      #
      # Iter-11 (2026-06-04, P012 reopen): rewritten to JS-compatible form.
      # `(?ims)^...` → `(^|\n)...` for the line-anchor + char classes for
      # case-insensitivity. Promptfoo compiles assertions with `new RegExp`
      # which does NOT support PCRE inline-flag groups; the previous form
      # errored and was counted as FAIL.
      - type: not-regex
        value: '(^|\n)\s*[Gg]it\s+[Mm]v\s+\S+[\s\S]{0,400}[Rr]elease\s+[Vv]ehicle'

  # P184 paired behavioural assertion — Conditional-deferral check BEFORE git mv.
  #
  # Driver: P184 (Agent treats conditionally-deferred work as permanently out
  # of scope — prematurely transitions parent ticket when X graduates). When
  # a K→V transition is proposed for a ticket whose body still carries a
  # `### Phase N` section with unticked `- [ ]` tasks AND surrounding prose
  # names a CONDITIONAL deferral whose gating dependency has now lifted
  # (e.g. "Phase 2 SHIP deferred to post-Phase-1-graduation" where Phase 1
  # has shipped), the agent MUST surface a halt-and-route option before
  # describing the `git mv` rename.
  #
  # Behavioural shape per ADR-052: prompts a realistic K→V scenario carrying
  # the P184 trigger pattern; asserts that the agent's response surfaces the
  # conditional-deferral check (named verbatim per the SKILL prose anchor)
  # and proposes halt-and-route language ahead of the rename command.
  #
  # @problem P184 (closes the SKILL-prose gap)
  # @adr ADR-044 (category 2 deviation-approval surface)
  - description: K→V transition — Conditional-deferral check precedes git mv (P184)
    vars:
      prompt: |
        I am executing /wr-itil:manage-problem Step 7 (Known Error →
        Verification Pending) for a problem ticket at
        docs/problems/known-error/170-rfc-002-story-map-framework.md.

        Ticket body excerpt:

          ## Fix Strategy
          Phase 1: ship story-map framework. **Phase 2 SHIP deferred to
          post-Phase-1-graduation per Out of Scope**.

          ### Phase 2 implementation tasks
          - [ ] Add backbone/ribs/slices renderer
          - [ ] Wire docs/story-maps/README.md refresh
          - [ ] Migrate existing story maps to new shape

        Phase 1 has just graduated — RFC-002 reached `.closed.md` and the
        changeset `.changeset/wr-itil-phase1-ship.md` is staged.

        Walk me through the EXACT sub-steps to transition this ticket to
        .verifying.md, in order. Be specific about whether any pre-flight
        checks fire BEFORE the `git mv` rename, and what to do if they fire.
    assert:
      # Tier A — must mention the conditional-deferral check anchor by name.
      - type: regex
        value: '[Cc]onditional[- ]deferral'
      # Tier A — must reference P184 by ID OR the substantive language
      # ("phase-tracking", "deferred-pending", "deferral lifted").
      - type: regex
        value: 'P184|phase[- ]tracking|deferred[- ]pending|deferral\s+lifted|conditionally[- ]deferred'
      # Tier A — must surface halt-and-route language (the SKILL's named
      # shape) rather than silent-proceed.
      - type: regex
        value: '[Hh]alt|[Aa]sk[Uu]ser[Qq]uestion|outstanding_questions|re-?open\s+[Pp]hase|[Pp]hase\s+[0-9]+.*in[- ]scope'
      # Tier A — ORDERING: conditional-deferral check must appear BEFORE
      # `git mv` so the user sees the halt option before the rename command.
      # JS RegExp compat per Iter-11 — char classes for case-insensitivity,
      # `[\s\S]` for dotall.
      - type: regex
        value: '[Cc]onditional[- ]deferral[\s\S]{0,3000}[Gg]it\s+[Mm]v'
      # Tier A — must NOT describe the rename as the first step (the P184
      # regressing shape — agent dispatches the K→V transition without
      # noticing the unticked Phase 2 tasks + lifted gating condition).
      - type: not-regex
        value: '(^|\n)\s*[Gg]it\s+[Mm]v\s+\S+[\s\S]{0,400}[Cc]onditional[- ]deferral'

  # P362 paired behavioural assertion — grep pre-check gates the
  # update-upstream dispatch.
  #
  # Driver: P362 (unconditional `/wr-itil:update-upstream` dispatch paid the
  # full sibling SKILL.md context load (~14 KB) on every transition just to
  # reach the no-op exit, when the common case is a ticket with no
  # `## Reported Upstream` section). The Step 7 P080 bidirectional-upstream
  # block now gates the Skill-tool dispatch behind a caller-side
  # `grep -q '^## Reported Upstream'` pre-check: dispatch only when the
  # section exists; skip-with-log otherwise. The grep IS the trigger,
  # preserving the fire-whenever-the-section-exists semantics while
  # eliminating the wasted context load. Discharges the R009 prose-surface
  # floor for the P080 trigger paragraph (the pre-existing eval cases cover
  # only the K→V Release-vehicle / conditional-deferral prose).
  #
  # Behavioural shape per ADR-052: prompts a realistic Step 7 transition for
  # a ticket WITHOUT a `## Reported Upstream` section; asserts the agent
  # describes the grep pre-check and the skip-the-dispatch outcome ahead of
  # the `/wr-itil:update-upstream` invocation, rather than dispatching
  # unconditionally.
  #
  # @problem P362 (closes the SKILL-prose gap)
  # @adr ADR-024 (P362 mechanism-refinement amendment) + ADR-054 (runtime budget)
  - description: Step 7 upstream lifecycle — grep pre-check gates update-upstream dispatch (P362)
    vars:
      prompt: |
        I am executing /wr-itil:manage-problem Step 7's "Bidirectional
        upstream lifecycle update (P080)" sub-block for a problem ticket at
        docs/problems/known-error/211-foo.md that I am transitioning to
        Verification Pending. The ticket has a `**Reported Upstream**` bullet
        in its `## Related` section but NO `## Reported Upstream` section
        header.

        Before I reach the Step 11 commit, do I dispatch
        /wr-itil:update-upstream, and if so what exactly runs first? Be
        specific about any mechanical check that decides whether the Skill
        tool is invoked at all.
    assert:
      # Tier A — must describe the grep pre-check on the section header.
      - type: regex
        value: 'grep[\s\S]{0,80}Reported\s+Upstream'
      # Tier A — must reference the `## Reported Upstream` section anchor.
      - type: contains
        value: '## Reported Upstream'
      # Tier A — must name the skill being gated.
      - type: contains
        value: 'update-upstream'
      # Tier A — must surface the skip-the-dispatch outcome for the
      # no-section case (the common no-op the pre-check short-circuits).
      - type: regex
        value: '[Ss]kip|do\s+not\s+(dispatch|invoke)|no[- ]op|don.t\s+(dispatch|invoke)'
      # Tier A — ORDERING: the grep pre-check must appear BEFORE the
      # /wr-itil:update-upstream dispatch. JS RegExp compat (char classes for
      # case-insensitivity, `[\s\S]` for dotall).
      - type: regex
        value: 'grep[\s\S]{0,1200}update-upstream'
      # Tier A — must NOT describe an unconditional dispatch as the first
      # action (the P362-regressing shape — fire update-upstream on every
      # transition, then rely on the sibling no-op exit). The pre-check must
      # precede the invocation.
      - type: not-regex
        value: '(^|\n)\s*/wr-itil:update-upstream[\s\S]{0,400}grep[\s\S]{0,80}Reported\s+Upstream'
