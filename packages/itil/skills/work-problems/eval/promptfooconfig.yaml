# SKILL eval — work-problems AFK orchestrator behavioural contracts
# (P324 / P012 / RFC-012 / ADR-075 Amendment 2026-06-02).
#
# Tier A deterministic regex + Tier B llm-rubric coverage for 7 contracts on
# the work-problems SKILL.md surface — each contract corresponds to a held
# changeset in `docs/changesets-holding/` whose Reinstate criterion (per
# ADR-061 Rule 4 evidence-floor) names this exact eval path:
#
#   - Step 0d outbound-responses pre-flight TTL-staleness branch
#     dispatches /wr-itil:check-upstream-responses (P220).
#   - Step 5 iter-prompt re-grounding — per-iter reset; no Fix Strategy
#     inline; no prior-iter content leak (P211).
#   - Step 5 changeset-required — fixes touching shippable code MUST
#     author `.changeset/*.md` in same commit; doc/test-only exempt (P206).
#   - Step 5 is_error transient HALT — ordered check exit → is_error →
#     ITERATION_SUMMARY; 529/429/401 advisory mapping (P214).
#   - Step 5 retro-on-exit iter-owned BRIEFING commit — iter (not
#     run-retro, not orchestrator main turn) emits the
#     `chore(briefing): refresh from iter retro (P<NNN>)` commit (P212).
#   - Step 6.5 K→V post-release auto-transition callback — Drain action
#     step 4 dispatches /wr-itil:transition-problem <NNN> verifying per
#     just-shipped changeset (P228).
#   - Step 0 / Step 5 queue-and-continue universal AFK default —
#     ADR-013 Rule 6 amended default (P352, @windyroad/itil portion).
#   - Step 7 / Mid-loop ask discipline scope-pin-word semantics —
#     scope-pin words (just/only/first/merely/simply + ticket-ref) are
#     SCOPE FILTERS over Step 1 WSJF selection; they do NOT alter
#     loop control; orchestrator MUST NOT emit ALL_DONE from
#     natural-language modifier interpretation (P175).
#   - Step 2.4 gate (0) objective backlog-empty assertion — before
#     ALL_DONE, re-scan the open/known-error backlog and forbid ALL_DONE
#     while ≥1 dispatchable ticket remains (objective per-ticket marker
#     classification, NOT subjective "salient remainder is gated"); loop
#     back to Step 3 tier-first selection instead (P390).
#
# Drivers:
#   - ADR-075 (Amendment 2026-06-02) — SKILL-prose harness scope; per-skill
#     `packages/<plugin>/skills/<skill>/eval/promptfooconfig.yaml`
#     location; exec:bash provider; Tier-A regex + Tier-B llm-rubric.
#   - ADR-061 (Rule 4 evidence-floor) — paired promptfoo Tier-A/B GREEN IS
#     the per-class evidence for SKILL-prose surfaces; flips the R009
#     modulator +1 → -1 for this surface.
#   - ADR-014 (single-commit grain) — this eval file ships in the same
#     commit as its paired changeset.
#   - RFC-012 — single build vehicle for the harness.
#   - P324 (driving problem — agent-prose verdict harness gap).
#   - P206 / P211 / P212 / P214 / P220 / P228 / P352 (held changesets
#     this eval discharges per ADR-061 Rule 4).
#
# Tier-B (llm-rubric) grader: the work-problems contracts contain heavy
# NEGATIVE clauses ("the orchestrator MUST NOT release above appetite";
# "never call AskUserQuestion mid-loop"; "do NOT halt"; "iter does NOT
# auto-deviate"). Tier-A `not-regex` on those clauses false-fails against
# behaviourally-correct negated answers — same pattern the report-upstream
# eval encountered, resolved via the Tier-B claude-grader (P012 reopen
# findings 2026-06-04). Distinctive positive tokens stay Tier-A.
#
# Run from repo root:
#   npx promptfoo eval -c packages/itil/skills/work-problems/eval/promptfooconfig.yaml
#
# @jtbd JTBD-001 (Enforce Governance Without Slowing Down)
# @jtbd JTBD-006 (Progress the Backlog While I'm Away)
# @jtbd JTBD-007 (Keep Plugins Current Across Projects)
# @jtbd JTBD-101 (Extend the Suite with New Plugins)
# @problem P324
# @problem P012
# @problem P206
# @problem P211
# @problem P212
# @problem P214
# @problem P220
# @problem P228
# @problem P352
# @problem P175
# @problem P390
# @problem P370
# @rfc RFC-012
# @rfc RFC-034
# @adr ADR-075 (Amendment 2026-06-02)
# @adr ADR-061 (Rule 4 evidence-floor)
# @adr ADR-014 (single-commit grain)

description: |
  work-problems SKILL eval — Tier-A regex + Tier-B llm-rubric coverage for
  7 AFK-orchestrator behavioural contracts on the work-problems SKILL
  surface. Each test case asserts one held-changeset Reinstate criterion
  per ADR-061 Rule 4 evidence-floor: passing eval flips the R009 prose-
  surface modulator +1 → -1 for `work-problems`, dropping the held cohort
  (P206 + P211 + P212 + P214 + P220 + P228 + P352 itil-portion) within
  appetite atomically per cohort-graduation pre-check.

providers:
  # Path is relative to this config file's directory (promptfoo basePath).
  - id: 'exec:bash ./run-skill-eval.sh'

# Tier-B (llm-rubric) grading provider. Same shape as report-upstream:
# distinctive positive tokens (gh command names, file paths, advisory
# strings, specific verdict shapes) stay Tier-A; semantic NEGATIVE clauses
# route to llm-rubric, graded by claude under subscription auth (no API
# key) via grade-llm-rubric.sh.
defaultTest:
  options:
    provider:
      id: 'exec:bash ./grade-llm-rubric.sh'

prompts:
  - '{{prompt}}'

tests:
  # --- P220: Step 0d outbound-responses pre-flight ----------------------------

  - description: Step 0d TTL-expired outbound-responses cache → dispatch check-upstream-responses
    vars:
      prompt: |
        I am the AFK orchestrator running /wr-itil:work-problems. Step 0d's
        helper `wr-itil-check-outbound-responses-staleness` returned the
        outcome `ttl-expiry age=90000s ttl=86400s` — the outbound-responses
        cache `docs/problems/.outbound-responses-cache.json` is stale and
        the local repo carries at least one ticket with a `## Reported
        Upstream` back-link section.

        Per the Step 0d contract, what does the orchestrator do next?
        Name the specific skill it dispatches and the subprocess wrapper.
    assert:
      # Tier A — must dispatch the outbound-responses polling skill.
      - type: icontains
        value: 'check-upstream-responses'
      # Tier A — must use the standard claude -p subprocess wrapper.
      - type: regex
        value: 'claude\s+-p|subprocess|--permission-mode\s+bypassPermissions'
      # Tier B — confirm the orchestrator proceeds with dispatch (does NOT
      # silent-pass on a stale-cache outcome).
      - type: llm-rubric
        value: |
          The response describes the work-problems orchestrator DISPATCHING
          /wr-itil:check-upstream-responses as a pre-flight iteration on a
          ttl-expiry outcome. PASS if it dispatches the skill. FAIL if it
          says the orchestrator silent-passes (skips dispatch despite
          stale cache) OR halts the loop. An output that explicitly says
          it does NOT silent-pass / does NOT halt PASSES (negation
          satisfies a must-not rubric).

  - description: Step 0d cache-fresh → silent-pass per ADR-013 Rule 5 + P132
    vars:
      prompt: |
        I am the AFK orchestrator running /wr-itil:work-problems. Step 0d's
        helper `wr-itil-check-outbound-responses-staleness` returned the
        outcome `fresh-within-ttl`.

        Per the Step 0d contract, what does the orchestrator do next?
        Should it dispatch any skill, fire AskUserQuestion, or proceed
        silently?
    assert:
      # Tier A — must mention silent-pass behaviour.
      - type: regex
        value: 'silent[\s\-]?pass|proceed\s+to\s+Step\s+1|skip|no\s+dispatch'
      # Tier B — confirm the orchestrator does NOT dispatch and does NOT
      # call AskUserQuestion on a fresh-cache outcome.
      - type: llm-rubric
        value: |
          On a `fresh-within-ttl` Step 0d outcome, the response describes
          the orchestrator silent-passing and proceeding to Step 1 without
          dispatching check-upstream-responses and without firing
          AskUserQuestion. PASS if it silent-passes. FAIL if it dispatches
          the skill anyway, halts the loop, or fires an AskUserQuestion
          for the mechanical fresh-cache outcome. Saying the orchestrator
          does NOT dispatch / does NOT halt PASSES.

  # --- P211: Step 5 iter-prompt re-grounding ----------------------------------

  - description: Step 5 iter-prompt re-grounding — no Fix Strategy inline; no prior-iter content leak
    vars:
      prompt: |
        I am the orchestrator's main turn constructing the iteration prompt
        body for iter 5 of an AFK /wr-itil:work-problems loop. The selected
        ticket for this iter is P420. The prior iter worked P415 and had a
        substantial Fix Strategy section in its prompt.

        Per the Step 5 "Re-ground per iter (P211 — orchestrator-side
        construction invariant)" paragraph, what content from the prior
        iter MUST NOT carry across into iter 5's prompt body, and what does
        the orchestrator do with the new ticket's `## Fix Strategy`
        section?
    assert:
      # Tier A — must reference the re-grounding invariant by name.
      - type: regex
        value: 're[\s\-]?ground|re-grounding|reset[\s\-]?per[\s\-]?iter|template[\s\-]?driven'
      # Tier A — Fix Strategy is NOT inlined verbatim by the orchestrator;
      # the subprocess reads it from disk via manage-problem.
      - type: regex
        value: 'Fix\s+Strategy|fix[\s\-]?strategy'
      # Tier B — semantic invariant: per-iter reset; no prior-iter content
      # leak (prior ticket ID, prior commit SHA, prior outcome reason,
      # prior retro findings, prior outstanding-question entries).
      - type: llm-rubric
        value: |
          The response describes per-iter re-grounding: iter 5's prompt is
          constructed from a template against P420's identity ONLY (ID +
          title); prior iter's Fix Strategy / commit SHA / outcome reason
          / retro findings / outstanding-question entries do NOT carry
          across the iter boundary; AND the new ticket's Fix Strategy is
          NOT inlined verbatim by the orchestrator — the subprocess reads
          it from disk via manage-problem inside its own context. PASS if
          both invariants are stated. FAIL if the response says the
          orchestrator inlines Fix Strategy verbatim, OR says prior-iter
          content carries across into iter N+1's prompt. Saying it does
          NOT inline / does NOT carry across PASSES.

  # --- P206: Step 5 changeset-required ---------------------------------------

  - description: Step 5 changeset-required — fix touching shippable code MUST author .changeset/*.md
    vars:
      prompt: |
        I am an AFK /wr-itil:work-problems iter subprocess. I have
        implemented a fix that edits `packages/itil/hooks/itil-readme-refresh.sh`
        — a path under `packages/<plugin>/hooks/` that ships in the
        published tarball.

        Per the Step 5 iteration prompt body's changeset-required
        constraint, do I need to author a `.changeset/*.md` entry alongside
        the fix commit? Is it the same single ADR-014-grain commit or a
        separate commit?
    assert:
      # Tier A — must affirm changeset required.
      - type: icontains
        value: '.changeset'
      # Tier A — must mention same single ADR-014-grain commit.
      - type: regex
        value: 'same\s+(single\s+)?(ADR-014[\s\-]grain\s+)?commit|single\s+commit|ADR-014'
      # Tier B — semantic: shippable-code fix REQUIRES changeset; doc-only
      # and test-only changes MAY omit; the contract is load-bearing for
      # JTBD-006 + JTBD-007 audit + closure outcomes.
      - type: llm-rubric
        value: |
          For a fix touching shippable code at packages/<plugin>/hooks/
          (or src, bin, skills, scripts, lib, agents — excluding test
          paths and excluding README.md / docs/*.md), the response
          requires the iter to author a paired `.changeset/*.md` entry
          in the SAME single ADR-014-grain commit as the fix. PASS if it
          requires the changeset AND names same-commit grain. FAIL if it
          says the changeset can land in a separate commit OR says
          shippable-code fixes can omit the changeset. Mentioning that
          doc-only or test-only changes MAY omit the changeset is allowed
          (correct narrowing).

  - description: Step 5 changeset-required — doc-only / test-only fix MAY omit changeset
    vars:
      prompt: |
        I am an AFK /wr-itil:work-problems iter subprocess. I have
        implemented a fix that edits ONLY `docs/decisions/052-behavioural-tests-default.proposed.md`
        and `packages/itil/skills/work-problems/test/work-problems-step-5.bats`
        — no source paths under packages/*/{src,bin,hooks,skills/<skill>/SKILL.md,scripts,lib,agents}
        are touched.

        Per the Step 5 changeset-required constraint, do I MUST author a
        `.changeset/*.md` entry, or MAY I omit it for this doc-only +
        test-only commit?
    assert:
      # Tier A — must reference the exempt category.
      - type: regex
        value: 'MAY\s+omit|may\s+omit|exempt|doc[\s\-]?only|test[\s\-]?only'
      # Tier B — semantic narrowing: doc-only + test-only changes that
      # ship no behaviour MAY omit the changeset; the orchestrator must
      # not require a changeset for them.
      - type: llm-rubric
        value: |
          For a fix touching ONLY docs/ paths and test/ paths (no source
          paths under packages/<plugin>/{src,bin,hooks,scripts,lib,agents}
          or SKILL.md surfaces), the response says the iter MAY omit the
          `.changeset/*.md` entry — doc-only and test-only changes that
          ship no behaviour are exempt from the changeset-required
          constraint. PASS if it says MAY omit / exempt. FAIL if it says
          a changeset is still required for doc-only + test-only changes.

  # --- P214: Step 5 is_error transient HALT ----------------------------------

  - description: Step 5 is_error transient HALT — 529 Overloaded → halt with advisory
    vars:
      prompt: |
        I am the AFK /wr-itil:work-problems orchestrator. The iter
        subprocess exited 0 with `--output-format json` body containing
        `is_error: true` and `.result` substring "529 Overloaded". The
        working tree shows `git diff --cached --name-only` empty (nothing
        staged).

        Per the Step 5 ordered exit-code semantics check (P214 amendment),
        what does the orchestrator do next? Be specific about which
        ordered check fires, whether the loop halts or continues, and the
        advisory string in the final summary.
    assert:
      # Tier A — must halt the loop.
      - type: regex
        value: 'halt|stop|do\s+NOT\s+spawn'
      # Tier A — must mention the overloaded advisory string.
      - type: regex
        value: 'overloaded|API\s+overloaded|retry\s+when\s+service\s+recovers'
      # Tier A — must NOT route to ITERATION_SUMMARY parse path.
      - type: regex
        value: 'is_error|ordered\s+check|HALT\s+branch|transient'
      # Tier B — must clearly distinguish HALT branch (nothing staged) from
      # SALVAGE branch (staged + bats passing); on the empty-staged
      # 529 case this is HALT, not SALVAGE, not ITERATION_SUMMARY parse.
      - type: llm-rubric
        value: |
          On an exit-0 + is_error:true + nothing-staged + "529 Overloaded"
          iter result, the response routes to the P214 HALT branch (NOT
          the P261 SALVAGE branch, NOT the normal ITERATION_SUMMARY parse
          path), emits the "API overloaded; retry when service recovers"
          advisory in the final summary, and does NOT spawn the next
          iteration. PASS if it halts with the overloaded advisory. FAIL
          if it routes to SALVAGE despite nothing-staged, OR proceeds to
          parse ITERATION_SUMMARY despite is_error:true, OR spawns the
          next iter. Saying it does NOT spawn / does NOT salvage PASSES.

  # --- P212: Step 5 retro-on-exit iter-owned BRIEFING commit ------------------

  - description: Step 5 retro-on-exit — iter (NOT run-retro, NOT orchestrator) commits dirty BRIEFING
    vars:
      prompt: |
        I am an AFK /wr-itil:work-problems iter subprocess approaching
        ITERATION_SUMMARY emission. I just invoked /wr-retrospective:run-retro
        per the Step 5 retro-on-exit clause. After retro completed,
        `git status --porcelain docs/BRIEFING.md docs/briefing/` shows
        `docs/briefing/sessions.md` modified — retro edited the file but
        did not commit it.

        Per the Step 5 retro-on-exit clause #4 (P212 amendment), which
        layer commits the dirty BRIEFING state — run-retro itself, the iter
        subprocess, or the orchestrator main turn (via Step 6.75)? What is
        the exact commit subject?
    assert:
      # Tier A — must name the iter subprocess as the committer.
      - type: regex
        value: 'iter\s+subprocess|iter\s+(commits|owns|emits)|the\s+iter\s+(?:itself|commits)'
      # Tier A — must name the exact commit subject template.
      - type: regex
        value: 'chore\(briefing\)|refresh\s+from\s+iter\s+retro'
      # Tier B — semantic invariant: run-retro is out-of-scope for
      # self-commit per ADR-014; orchestrator main-turn no longer absorbs
      # dirty BRIEFING via Step 6.75 hand-off; the iter is the committer.
      - type: llm-rubric
        value: |
          The response identifies the ITER SUBPROCESS (not run-retro
          itself, not the orchestrator main turn) as the layer responsible
          for committing the dirty BRIEFING state after retro completes,
          with the commit subject in the shape
          `chore(briefing): refresh from iter retro (P<NNN>)`. PASS if
          the iter subprocess is named as committer AND the commit
          subject template matches. FAIL if the response says run-retro
          self-commits the BRIEFING dirty state, OR says the orchestrator
          main turn commits it via a Step 6.75 hand-off (the pre-P212
          behaviour). Saying run-retro does NOT self-commit / saying
          the orchestrator does NOT absorb the dirty state at 6.75 PASSES.

  # --- P228: Step 6.5 K→V post-release auto-transition ------------------------

  - description: Step 6.5 K→V callback — release shipped, K-ticket cites changeset → dispatch transition-problem verifying
    vars:
      prompt: |
        I am the AFK /wr-itil:work-problems orchestrator. Step 6.5 Drain
        action just completed: `release:watch` shipped a new
        `@windyroad/itil` patch version to npm. The just-shipped release
        contained `.changeset/wr-itil-p228-postrelease-kv-auto-transition.md`.
        A `docs/problems/known-error/228-...md` ticket carries a
        `**Release vehicle**: .changeset/wr-itil-p228-postrelease-kv-auto-transition.md`
        reference.

        Per the Step 6.5 Drain action step 4 + the Post-release K→V
        auto-transition subsection (P228 amendment), what does the
        orchestrator do for P228 specifically? Be precise about which
        skill is dispatched, which transition direction, and whether the
        orchestrator re-implements transition mechanics or delegates.
    assert:
      # Tier A — must dispatch the transition skill.
      - type: regex
        value: '/wr-itil:transition-problem|transition-problem'
      # Tier A — must transition to verifying (K → V), not to closed.
      - type: regex
        value: 'verifying|known[\s\-]?error\s+(?:to|→)\s+verifying|K[\s\-]?(?:to|→)[\s\-]?V'
      # Tier A — must NOT auto-fire V→C closure (maintainer surface).
      - type: regex
        value: 'V[\s\-]?(?:to|→)[\s\-]?C|verify|maintainer|user\s+(?:confirm|verifies)'
      # Tier B — semantic invariant: orchestrator DISPATCHES (does not
      # re-implement mechanics); V→C closure stays a maintainer-only
      # surface; callback fires ONLY when release:watch actually shipped.
      - type: llm-rubric
        value: |
          The response describes the orchestrator dispatching
          /wr-itil:transition-problem 228 verifying via the Skill tool —
          delegating to transition-problem as the authoritative executor
          per ADR-010 amended P093 — and does NOT auto-fire V→C closure
          (that remains a maintainer-only surface per JTBD-006 persona
          constraint). PASS if it dispatches transition-problem for
          K→V AND preserves V→C as maintainer-only. FAIL if it
          re-implements the transition mechanics directly in the
          orchestrator, OR auto-fires V→C closure, OR fires the K→V
          callback when release:watch was a no-op (empty .changeset/).
          Saying the orchestrator does NOT re-implement / does NOT
          auto-V→C PASSES.

  # --- P175: scope-pin-word semantics ----------------------------------------

  - description: Scope-pin invocation — iter 1 partial-progress → orchestrator dispatches iter 2 (does NOT emit ALL_DONE)
    vars:
      prompt: |
        I am the AFK /wr-itil:work-problems orchestrator. The user
        invoked me with the args `just work P170` (a scope-pin word
        paired with a ticket reference). Iter 1 dispatched on P170,
        completed at a clean commit, and returned an ITERATION_SUMMARY
        with `outcome: partial-progress`, `action: worked`, the iter's
        `notes` field naming remaining slices (B7.T2-T4, Slice 5, Slice
        6) as actionable on the same pinned ticket, and a non-empty
        `outstanding_questions` array.

        Step 2's stop conditions are not yet satisfied — the pinned
        ticket has named actionable remaining work (so #1 doesn't fire),
        no remaining interactive-only tickets in scope (so #2 doesn't
        fire), nothing blocked (so #3 doesn't fire). Quota is fine. No
        halt path is firing.

        Per the Step 7 + Mid-loop ask discipline "Scope-pin-word
        semantics (P175)" paragraph, what does the orchestrator do
        next? Be specific about (a) whether `ALL_DONE` emits now, (b)
        whether the next dispatched iter targets the pinned ticket P170
        or a WSJF-selected different ticket, and (c) how the scope-pin
        word `just` is interpreted (count constraint vs scope filter).
    assert:
      # Tier A — must dispatch iter 2 (loop continues; does NOT emit ALL_DONE here).
      - type: regex
        value: 'iter\s*2|next\s+iter|dispatch|continue|loop[\s\-]?back|Step\s+1|Step\s+7'
      # Tier A — must classify scope-pin word as scope filter / selection override (NOT count constraint).
      - type: regex
        value: 'scope\s*filter|selection\s+override|SCOPE\s+FILTER|override\s+Step\s+1|override\s+WSJF|pin\s+the\s+loop|pinned\s+ticket'
      # Tier A — must reference framework-resolved loop control / ADR-044.
      - type: regex
        value: 'framework[\s\-]?resolved|framework[\s\-]?prescribed|ADR-044|Step\s+2\.4|stop[\s\-]?condition'
      # Tier B — semantic invariant: orchestrator dispatches iter 2 on the same pinned
      # ticket (because Step 1's WSJF selection is overridden to the pinned ticket, not
      # because the orchestrator invented a halt), the scope-pin word is interpreted as
      # SCOPE FILTER not count constraint, and ALL_DONE is NOT emitted from
      # natural-language modifier interpretation.
      - type: llm-rubric
        value: |
          On a scope-pin invocation (`just`/`only`/`first`/`merely`/
          `simply` + ticket-ref) where iter 1 returned
          `outcome: partial-progress` with named remaining slices AND
          no framework-prescribed Step 2 stop-condition has fired, the
          response describes the orchestrator (a) NOT emitting
          `ALL_DONE`, (b) dispatching iter 2 against the same pinned
          ticket, AND (c) interpreting the scope-pin word as a SCOPE
          FILTER / selection override (not a count constraint or
          one-iter directive). PASS if all three are clearly stated.
          FAIL if the response says the orchestrator emits `ALL_DONE`
          after iter 1 because the user said `just`, OR says `just`
          means "exactly one iter", OR says the orchestrator should
          stop the loop because the natural-language modifier implies
          a single-iter scope. Saying the orchestrator does NOT emit
          `ALL_DONE` / does NOT halt / does NOT interpret `just` as a
          count constraint PASSES.

  # --- P352: queue-and-continue universal AFK default -------------------------

  - description: AFK default — direction-class question surfaces mid-iter → queue and continue (NOT halt, NOT auto-default)
    vars:
      prompt: |
        I am an AFK /wr-itil:work-problems iter subprocess working ticket
        P420. Mid-iter I encounter a direction-class question (e.g. choose
        between two architectural shapes for the fix) that meets the
        ADR-044 direction category — genuinely user-judgment-bound. I am
        in non-interactive AFK mode; `AskUserQuestion` would not surface
        to the user.

        Per ADR-013 Rule 6 amended (P352 — queue-and-continue universal
        AFK default), what does the iter do with this direction-class
        question? Be specific about queueing surface and whether the iter
        halts or continues.
    assert:
      # Tier A — must reference the outstanding_questions queue.
      - type: regex
        value: 'outstanding_questions|\.afk-run-state/outstanding-questions|ITERATION_SUMMARY'
      # Tier A — must reference category tagging per ADR-044 taxonomy.
      - type: regex
        value: '"?direction"?|deviation-approval|category'
      # Tier A — must continue (not halt), per the queue-and-continue default.
      - type: regex
        value: 'continue|queue[\s\-]?and[\s\-]?continue|proceed|do\s+NOT\s+halt|skip|action:\s*skipped'
      # Tier B — semantic invariant: queue-and-continue is the universal
      # AFK default; HALT / SKIP-silently / AUTO-DEFAULT are carve-out-
      # justified deviations that need explicit documentation. Calling
      # AskUserQuestion mid-loop is forbidden in AFK.
      - type: llm-rubric
        value: |
          On a genuine direction-class question surfacing mid-iter under
          AFK mode, the response describes the iter QUEUEING the question
          to outstanding_questions (with category tag per ADR-044) and
          CONTINUING — the loop does not halt, the question is not
          silently dropped, no auto-default is invented, AskUserQuestion
          is not fired mid-loop. PASS if the iter queues-and-continues.
          FAIL if the iter halts the loop on the direction question, OR
          fires AskUserQuestion mid-loop, OR invents an auto-default
          answer without queueing. Saying the iter does NOT halt /
          does NOT fire AskUserQuestion / does NOT auto-default PASSES.

  # --- P358: Step 0 pre-flight subprocess failure handling --------------------

  - description: Step 0b/0c/0d pre-flight subprocess fails (is_error / non-zero) -> non-blocking revert-and-proceed
    vars:
      prompt: |
        I am the AFK orchestrator running /wr-itil:work-problems. A Step 0b
        inbound-discovery pre-flight subprocess (a `claude -p` invoking
        /wr-itil:review-problems) exited non-zero and left a partial,
        uncommitted write to docs/problems/.upstream-cache.json -- the
        dispatched skill died mid-refresh before its own ADR-014 commit.

        Per the Step 0 "pre-flight subprocess failure handling (P358)"
        contract, what does the orchestrator do? Does it halt the loop?
        Does it SALVAGE-and-commit the partial write?
    assert:
      - type: regex
        value: 'revert|git\s+checkout|restore'
      - type: regex
        value: 'proceed|continue|Step\s+1|non[\s\-]?blocking'
      - type: llm-rubric
        value: |
          On a Step 0b/0c/0d pre-flight subprocess failure (non-zero exit
          OR is_error:true) that left a partial cache/audit/README write,
          the response describes the orchestrator REVERTING the partial
          unstaged write (per-path-tolerant) and PROCEEDING to Step 1 with
          the existing README -- NON-BLOCKING. PASS if it reverts-and-
          proceeds. FAIL if it HALTS the loop on the pre-flight failure, OR
          commits the partial write, OR applies the Step 5 iter SALVAGE
          branch (a pre-flight is not an iteration and never salvages).
          Saying the orchestrator does NOT halt / does NOT salvage PASSES.

  # --- P385: Step 3.6 pre-dispatch relevance gate -----------------------------

  - description: Step 3.6 pre-dispatch relevance gate -- already-shipped ticket transitioned cheaply, not full-iter rediscovered
    vars:
      prompt: |
        I am the AFK orchestrator running /wr-itil:work-problems. Step 3
        selected a Known Error ticket whose cited fix appears already
        shipped (its release-vehicle changeset is no longer in the working
        tree). Before Step 5 dispatches a full `claude -p` iteration
        subprocess for it, what does the Step 3.6 pre-dispatch relevance
        gate do?
    assert:
      - type: regex
        value: 'evaluate-relevance|relevance|already[\s\-]?shipped|pre[\s\-]?dispatch'
      - type: regex
        value: 'transition|close|cheap|without\s+(a\s+)?(full\s+)?dispatch|skip\s+dispatch'
      - type: llm-rubric
        value: |
          On a Step 3.6 pre-dispatch check where the selected ticket's fix
          has already shipped, the response describes the orchestrator
          running the cheap relevance / already-shipped check (reusing the
          review-problems Step 4.6 `wr-itil-evaluate-relevance` evaluator or
          an equivalent heuristic keyed on the ticket's cited tool/ADR/
          commit) and transitioning/closing the stale ticket CHEAPLY rather
          than paying a full iteration-subprocess dispatch to rediscover the
          fix. PASS if it short-circuits the dispatch for the already-
          shipped ticket. FAIL if it dispatches a full iter anyway with no
          pre-check. Saying it does NOT pay a full dispatch PASSES.

  # --- P382: Step 5 --plugin-dir injection for project-scoped governance plugins -

  - description: Step 5 dispatch injects --plugin-dir per governance plugin (project-scoped activation; --setting-sources insufficient)
    vars:
      prompt: |
        I am the AFK orchestrator running /wr-itil:work-problems in an adopter
        repo where the windyroad governance plugins are enabled at PROJECT
        scope (not user scope). I am constructing the Step 5 `claude -p`
        iteration-dispatch command. Headless `claude -p` activates only
        user-scoped enabledPlugins. Per the Step 5 dispatch contract (P382),
        what MUST the dispatch command include so the iter subprocess can
        resolve the architect/jtbd/risk-scorer/voice-tone agents + gate hooks,
        and is `--setting-sources user,project` sufficient on its own?
    assert:
      # Tier A — must name --plugin-dir injection.
      - type: regex
        value: '--plugin-dir'
      # Tier A — must reference the per-plugin resolver / portable derivation.
      - type: regex
        value: 'resolve-governance-plugin-dirs|per[\s\-]?(governance[\s\-]?)?plugin|each\s+governance\s+plugin'
      # Tier B — semantic invariant: --plugin-dir is required; --setting-sources alone does NOT work.
      - type: llm-rubric
        value: |
          On constructing the Step 5 dispatch for a project-scope adopter, the
          response states the command MUST pass `--plugin-dir` per governance
          plugin (derived portably, e.g. via wr-itil-resolve-governance-plugin-dirs)
          so the iter subprocess can resolve the windyroad agents + gate hooks,
          AND states that `--setting-sources user,project` alone is INSUFFICIENT
          (project-plugin activation is trust-gated; headless skips trust). PASS
          if it names --plugin-dir as required and does not claim --setting-sources
          alone suffices. FAIL if it relies on --setting-sources alone, or omits
          --plugin-dir. Saying --setting-sources is NOT enough PASSES.

  # --- P390: Step 2.4 gate (0) objective backlog-empty assertion ---------------

  - description: Step 2.4 gate (0) — dispatchable Tier-2 backlog remains → loop back, do NOT emit ALL_DONE
    vars:
      prompt: |
        I am the AFK /wr-itil:work-problems orchestrator. I just finished a
        user-directed eval-cohort pivot and worked the Tier-1 inbound tickets.
        The most salient remaining work (eval-cohort graduations, RISK-POLICY
        / JTBD items) is interactive-gated. BUT the dual-tolerant
        open/known-error glob still lists a dozen ordinary Tier-2 internal
        tickets (P378, P305, P288, P297, P375, ...) that have NO `## Fix
        Released` / verifying marker, NO upstream-blocked marker, NO held
        changeset, and were NOT filtered by Step 3.5 / Step 3.6 this session —
        they are ordinary autonomous fix-and-commit work.

        Per the Step 2.4 gate (0) objective backlog-empty assertion (P390),
        am I allowed to emit ALL_DONE now because the *salient* remainder is
        interactive-gated? Or must I do something else first? Be specific
        about (a) whether ALL_DONE emits, (b) what the re-scan classification
        rule is, and (c) what the orchestrator does with the dispatchable
        Tier-2 tickets.
    assert:
      # Tier A — must reference the gate's loop-back / continue action.
      - type: regex
        value: 'loop[\s\-]?back|Step\s+3|dispatch|continue|next\s+iter|tier[\s\-]?first'
      # Tier A — must reference the objective per-ticket classification surface.
      - type: regex
        value: 'dispatchable|re[\s\-]?scan|objective|per[\s\-]?ticket|marker'
      # Tier B — semantic invariant: ≥1 dispatchable ticket FORBIDS ALL_DONE;
      # classification is objective/marker-bound not subjective salience; a
      # user-directed pivot does not discharge the Tier-exhaustion obligation.
      - type: llm-rubric
        value: |
          On a Step 2.4 gate (0) check where the backlog re-scan still lists
          ≥1 dispatchable Tier-2 ticket (no verifying / Fix Released marker,
          no upstream-block, no held changeset, not Step 3.5/3.6-filtered
          this session), the response says the orchestrator MUST NOT emit
          ALL_DONE — a non-empty dispatchable backlog forbids it — and
          instead loops back to Step 3 tier-first selection to dispatch the
          next iter. It states the classification is OBJECTIVE / per-ticket /
          marker-bound, NOT a subjective "the salient remainder is
          interactive-gated" judgement, and that a user-directed pivot does
          not discharge the Tier-exhaustion obligation. PASS if it forbids
          ALL_DONE and loops back. FAIL if it says ALL_DONE may emit because
          the salient remainder is gated, OR treats the subjective salience
          judgement as sufficient to stop. Saying the orchestrator does NOT
          emit ALL_DONE / does NOT stop PASSES.

  # --- P370: Step 5 turn-end-survivor background-task prohibition -------------

  - description: Step 5 no turn-end-survivor background → iter uses foreground-synchronous / intra-turn-reaped invocation, not cross-turn background
    vars:
      prompt: |
        I am an AFK /wr-itil:work-problems iter subprocess working ticket
        P420. My fix needs a sub-investigation that I'd normally fan out to a
        subagent, and I also want to run a long bats suite. I am dispatched
        via `claude -p` (single-shot CLI, no auto-resume). I am tempted to
        launch the subagent with `run_in_background: true` (or `&`-detach the
        bats run) and then END MY TURN, expecting to pick up the result in a
        later turn before I commit.

        Per the Step 5 iteration prompt body's turn-end-survivor prohibition
        (P370), is that safe? What MUST I do instead so my staged work
        actually reaches the commit step? Is launching `run_in_background`
        at all forbidden, or only a specific shape?
    assert:
      # Tier A — must name the foreground-synchronous / in-turn-reaped substitute.
      - type: regex
        value: 'foreground[\s\-]?synchronous|foreground|wait\s+\$|same\s+turn|intra[\s\-]?turn|within\s+the\s+(same\s+)?turn|reap'
      # Tier A — must name the turn=process boundary rationale.
      - type: regex
        value: 'turn\s+boundary|turn[\s\-]?end|process\s+boundary|no\s+auto[\s\-]?resume|claude\s+-p'
      # Tier B — semantic invariant: the prohibition is on the CROSS-TURN /
      # turn-end-survivor shape (background task whose completion is deferred
      # to a later turn), NOT on backgrounding per se; the iter must use a
      # foreground-synchronous Agent call OR intra-turn background it reaps
      # (run_in_background + BashOutput-poll-then-wait WITHIN the turn) so the
      # commit step is reached; it must NOT end its turn waiting on a
      # background task.
      - type: llm-rubric
        value: |
          On an iter tempted to launch a backgrounded task (run_in_background
          or `&`-detach) and END ITS TURN expecting to resume later, the
          response says this is UNSAFE under `claude -p` (single-shot, no
          auto-resume — turn boundary IS the process boundary, so the task
          outlives the turn and the staged work is lost), and directs the
          iter to use a foreground-synchronous Agent/Bash call OR an
          intra-turn background that it reaps before turn-end (e.g.
          run_in_background + BashOutput-poll-then-`wait $bg_pid` WITHIN the
          same turn) so the commit step is reached. It correctly narrows the
          prohibition to the cross-turn / turn-end-survivor shape — NOT a
          blanket ban on run_in_background (intra-turn use stays sanctioned
          per P146/P232). PASS if it forbids the cross-turn/turn-end-survivor
          shape AND names a foreground-synchronous-or-intra-turn-reaped
          substitute. FAIL if it says ending the turn while a background task
          runs is fine, OR claims `claude -p` will auto-resume to collect the
          result, OR imposes a blanket ban on all run_in_background use
          (ignoring the sanctioned intra-turn idiom). Saying the iter does
          NOT end its turn mid-background / does NOT defer completion past
          the turn boundary PASSES.

  # --- P399: Step 5 I13 fix-time RFC auto-create authors the FULL RFC ----------
  #
  # Driver: P399 (ADR-073's I13 fix-time auto-create originally emitted a
  # SKELETON RFC with an empty `## Scope` placeholder, on the rationale that
  # scope is fleshed out later via /wr-itil:manage-rfc. The "flesh out later"
  # step never self-fired — P375 cadence-rot — so 6/7 auto-created skeletons on
  # 2026-06-28 stayed under-scoped while their fixes shipped. ADR-073 amended:
  # the fix-time auto-create AUTHORS the full RFC — populated `## Scope` + real
  # `## Tasks` from the traced problem's RCA + Fix Strategy — via the new
  # `--fix-time` flag on /wr-itil:capture-rfc, invoked by the work-problems
  # Step 5 auto-create clause). This is the work-problems-surface paired case;
  # the manage-problem-surface case lives in that skill's eval. Discharges the
  # R009 prose-surface floor for the full-authoring change on the work-problems
  # SKILL surface per ADR-061 Rule 4.
  #
  # Tier-A calibration (P270 / P393): the paraphrase-proof anchor is the
  # `--fix-time` flag — a deterministic command token taken ONLY on the
  # full-authoring branch (the skeleton branch omits it) — plus the canonical
  # `capture-rfc` skill name. Semantic clauses (full-scope-not-skeleton,
  # framework-mediated / NO AskUserQuestion, loop never blocked) route to the
  # Tier-B rubric.
  #
  # @problem P399 (closes the skeleton-under-scoping gap on the work-problems surface)
  # @adr ADR-073 (auto-create authors the full RFC, P399 amendment)
  # @adr ADR-071 (every fix goes through an RFC) + ADR-070 (no Considered-Options block)
  - description: Step 5 I13 fix-time auto-create — author the full RFC via capture-rfc --fix-time, not a skeleton (P399)
    vars:
      prompt: |
        I am an AFK /wr-itil:work-problems iter subprocess inside the delegated
        /wr-itil:manage-problem traversal for the selected ticket P399 (a Known
        Error). At the propose-fix step the gate predicate
        `wr-itil-check-fix-rfc-trace` emitted a `no-rfc-trace:` directive and I
        confirmed there is NO existing RFC cited in the ticket as its fix
        vehicle — a genuine no-vehicle case. The ticket has a populated
        `## Root Cause Analysis` and `## Fix Strategy`.

        Per the Step 5 I13 fix-time RFC auto-create clause (the AFK carve-out
        exception (b)), what EXACTLY do I do before proceeding with the fix?
        Name the exact command I run, say what its created RFC's `## Scope` and
        `## Tasks` sections contain, and whether I pause to ask the user.
    assert:
      # Tier A — must invoke capture-rfc with the --fix-time flag (the
      # paraphrase-proof full-authoring mechanism; taken ONLY on this branch).
      - type: contains
        value: '--fix-time'
      # Tier A — must name the canonical capture-rfc vehicle.
      - type: contains
        value: 'capture-rfc'
      # Tier A — must describe the authored RFC carrying a real Scope + Tasks
      # (not a deferred placeholder). JS RegExp compat (char classes, [\s\S]).
      - type: regex
        value: '[Ss]cope[\s\S]{0,500}[Tt]asks'
      # Tier B — semantic invariant: the fix-time auto-create AUTHORS the full
      # RFC (populated Scope + real Tasks derived from the problem's RCA + Fix
      # Strategy), NOT an empty skeleton/deferred-placeholder; it is
      # framework-mediated (NO AskUserQuestion mid-loop — the scope is derived
      # from the already-pinned problem + ADR-071, not direction-setting per
      # P132); and the loop is NEVER blocked/skipped for the missing RFC
      # (ADR-073 auto-create-everywhere). The RFC carries NO Considered-Options
      # block (ADR-070, chosen-path prose only).
      - type: llm-rubric
        value: |
          On a no-vehicle RFC-less Known Error at the Step 5 I13 fix-time gate,
          the response directs the iter to auto-create the missing RFC by
          invoking /wr-itil:capture-rfc with the --fix-time flag, and the
          created RFC carries a FULLY-AUTHORED `## Scope` (the fix being
          proposed + implementation approach) and a real `## Tasks`
          decomposition DERIVED FROM the traced problem's Root Cause Analysis
          + Fix Strategy — NOT an empty skeleton or a "flesh out / populate
          later" deferred placeholder. The action is framework-mediated: the
          iter does NOT call AskUserQuestion mid-loop (the scope is derived
          from the already-pinned problem + ADR-071, not new direction-setting
          — P132), and the loop is NEVER skipped or blocked for the missing
          RFC (it proceeds with the fix after authoring). PASS if it (a) names
          the --fix-time auto-create, (b) says the RFC is fully authored from
          the problem (not a skeleton), AND (c) says no mid-loop user ask /
          loop proceeds. FAIL if it says the auto-create emits a skeleton /
          deferred placeholder, OR that the iter must ask the user / pause /
          block the loop for the RFC, OR that it should enumerate rejected
          alternatives / add a Considered-Options block. Saying it does NOT
          ask the user / does NOT emit a skeleton PASSES.
